<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - JuryPilot</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            color: #172033;
            background: linear-gradient(135deg, #f4f7fb 0%, #e8f0ff 100%);
            padding: 24px;
        }
        .login-card {
            width: min(420px, 100%);
            background: white;
            border: 1px solid #dce3ee;
            border-radius: 8px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.10);
            padding: 30px;
        }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
        .brand-mark { width: 42px; height: 42px; border-radius: 8px; display: grid; place-items: center; background: #2563eb; color: white; font-weight: 900; }
        h1 { margin: 0; font-size: 1.45rem; }
        p { color: #68758a; line-height: 1.5; margin: 6px 0 22px; }
        label { display: grid; gap: 6px; color: #475569; font-weight: 700; font-size: 0.9rem; margin-bottom: 14px; }
        input { width: 100%; border: 1px solid #dce3ee; border-radius: 7px; padding: 12px; font: inherit; }
        .btn { width: 100%; border: 0; border-radius: 7px; background: #2563eb; color: white; padding: 12px; font-weight: 800; cursor: pointer; font: inherit; }
        .btn:hover { background: #1d4ed8; }
        .error { color: #b91c1c; background: #fdecec; border: 1px solid #f7caca; border-radius: 7px; padding: 10px 12px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <div class="brand-mark">JP</div>
            <div>
                <h1>Connexion</h1>
                <p>Accedez a la gestion des jurys et des soutenances.</p>
            </div>
        </div>

        {% if form.errors %}
        <div class="error">Identifiants incorrects. Verifiez le nom d'utilisateur et le mot de passe.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label>
                Nom d'utilisateur
                <input type="text" name="username" autocomplete="username" required>
            </label>
            <label>
                Mot de passe
                <input type="password" name="password" autocomplete="current-password" required>
            </label>
            <button type="submit" class="btn">Se connecter</button>
        </form>
    </main>
</body>
</html>
